<!DOCTYPE html>
<html>
<head>
    <title>Admin | Community Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
        body {
            margin: 0;
            font-family: system-ui;
            background: linear-gradient(-45deg, #0A2540, #1E3A8A, #0b62c5, #0A2540);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            color: #ccc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 18px;
            background: rgba(0,0,0,0.6);
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
        }

        .navbar a {
            color: #ccc;
            text-decoration: none;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #0EA5E9;
        }

        /* MAIN */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glow-box {
            background: rgba(0,0,0,0.7);
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            text-align: center;

            box-shadow:
                0 0 5px rgb(0, 151, 197),
                0 0 15px rgb(0, 151, 197),
                0 0 30px rgb(0, 151, 197);
        }

        /* INPUT WRAPPERS (FIXED ALIGNMENT SYSTEM) */
        .input-wrap {
            width: 90%;
            margin: 18px auto;
        }

        .input-wrap input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #111;
            color: #fff;
            box-sizing: border-box;
        }

        /* PASSWORD WRAPPER */
        .pass-wrap {
            position: relative;
        }

        /* EYE ICON */
        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #ccc;
            font-size: 14px;
            user-select: none;
        }

        .eye-btn:hover {
            color: #0EA5E9;
        }

        /* BUTTON */
        button {
            width: 95%;
            padding: 10px;
            background: #0EA5E9;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0284c7;
        }

        /* FOOTER */
        .footer {
            background: rgba(0,0,0,0.7);
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        .footer a {
            color: #0EA5E9;
            text-decoration: none;
        }

body {
  margin: 0;
  overflow-x: hidden;
  transition: none; /* important: avoid conflict */
}

/* normal state */
body {
  transform: translateX(0);
}

/* exit animation (now sliding) */
body.fade-out {
  animation: slideOut 0.1s ease forwards;
}

/* optional: entry animation */
body {
  animation: slideIn 0.1s ease forwards;
}

@keyframes slideIn {
  from {
    transform: translateX(100%);
  }
  to {
    transform: translateX(0);
  }
}

@keyframes slideOut {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-100%);
  }
}

/* =========================
           MOBILE RESPONSIVENESS ONLY
           ========================= */

* {
    box-sizing: border-box;
}

body {
    overflow-x: hidden;
}

/* Navbar responsiveness (no design change, just wrapping) */
    .navbar {
        flex-wrap: wrap;
        gap: 12px;
        padding: 12px;
    }        
           
        @media (max-width: 600px) {

        .navbar {
        justify-content: center;
        gap: 10px;
        font-size: 13px;
        }

            .glow-box {
                width: 90%;
                padding: 18px;
                margin: 20px auto;
            }

            .input-wrap {
                width: 100%;
            }

            button {
                width: 100%;
            }

            .container {
                padding: 20px;
                align-items: flex-start;
            }
        }


</style>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="About us.html">About</a>
    <a href="Achievements.html">Achievements</a>
    <a href="Events.html">Events</a>
    <a href="Details Form.html">Contact</a>
    <a href="Admin.html">Admin</a>
</div>

<body class="fade-out">

<!-- MAIN -->
<div class="container">

    <div class="glow-box">
        <h2>Admin Login</h2>

        <!-- PERFECTLY ALIGNED INPUTS -->
        <div class="input-wrap">
            <input id="username" type="text" placeholder="Username">
        </div>

        <div class="input-wrap pass-wrap">
            <input id="password" type="password" placeholder="Password">
            <span class="eye-btn" onclick="togglePassword()">👁</span>
        </div>

        <p style="margin-top:15px;">
    <a href="#" onclick="forgotPassword()" style="color:#0EA5E9; text-decoration:none;">
        Forgot Password?
    </a>
</p>
        <button onclick="login()">Login</button>
    </div>

</div>

<script>

// ================= API BASE URL =================
const API_URL = "https://my-backend-api-zwfq.onrender.com";


// ================= SESSION CLEANUP =================
window.addEventListener("pageshow", function () {
    if (!sessionStorage.getItem("activeSession")) {
        localStorage.removeItem("adminAuth");
    }
});


// ================= MESSAGE POPUP =================
function showMessage(text, color) {
    let box = document.getElementById("msgBox");

    if (!box) {
        box = document.createElement("div");
        box.id = "msgBox";
        document.body.appendChild(box);
    }

    box.textContent = text;

    box.style.position = "fixed";
    box.style.top = "20px";
    box.style.right = "20px";
    box.style.padding = "12px 18px";
    box.style.borderRadius = "8px";
    box.style.color = "white";
    box.style.fontFamily = "system-ui";
    box.style.fontSize = "14px";
    box.style.zIndex = "9999";
    box.style.background = color;

    setTimeout(() => box.remove(), 2500);
}


// ================= TOGGLE PASSWORD =================
function togglePassword() {
    const password = document.getElementById("password");
    const eye = document.querySelector(".eye-btn");

    if (!password || !eye) return;

    if (password.type === "password") {
        password.type = "text";
        eye.textContent = "🙈";
    } else {
        password.type = "password";
        eye.textContent = "👁";
    }
}


// ================= LOGIN FUNCTION =================
async function login() {

    const username = document.getElementById("username")?.value;
    const password = document.getElementById("password")?.value;

    try {
        const res = await fetch(`${API_URL}/api/admin-login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        console.log("LOGIN RESPONSE:", data);

        if (res.ok && data.success) {

            localStorage.setItem("adminAuth", "true");
            sessionStorage.setItem("activeSession", "true");
            localStorage.setItem("adminRole", data.role);

            showMessage("Login successful! Redirecting...", "#22c55e");

            setTimeout(() => {

                const role = (data.role || "").trim().toLowerCase();

                console.log("NORMALIZED ROLE:", role);

                if (role === "superadmin") {
                    window.location.href = "Super admin.html";
                } else {
                    window.location.href = "Admin Panel.html";
                }

            }, 1000);

        } else {
            showMessage(data.message || "Login failed", "#ef4444");
        }

    } catch (error) {
        console.error(error);
        showMessage("Cannot connect to server", "#ef4444");
    }
}


// ================= ENTER KEY LOGIN =================
document.addEventListener("DOMContentLoaded", () => {

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    if (!usernameInput || !passwordInput) return;

    usernameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            passwordInput.focus();
        }
    });

    passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            login();
        }
    });

});


// ================= FORGOT PASSWORD MODAL =================
function forgotPassword() {
    const modal = document.getElementById("forgotModal");
    if (modal) modal.style.display = "flex";
}

function closeForgotModal() {
    const modal = document.getElementById("forgotModal");
    if (modal) modal.style.display = "none";
}

</script>
<!-- FOOTER -->
<div class="footer">
    <p>© 2026 Mondeor Community Portal | Built for the community</p>
    <p>
        Contact: <a href="mailto:support@community.com">support@community.com</a>
    </p>
</div>

<!-- FORGOT PASSWORD MODAL -->
<div id="forgotModal" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
">

    <div style="
        background:rgba(0,0,0,0.9);
        padding:25px;
        border-radius:12px;
        width:320px;
        text-align:center;
        box-shadow:0 0 15px #000000;
        color:white;
    ">

        <h3 style="margin-top:0; color:#0EA5E9;">Forgot Password</h3>

        <p style="font-size:14px; line-height:1.4;">
            Please contact the Super Administrator to reset your password.
        </p>

        <button onclick="closeForgotModal()" style="
            margin-top:15px;
            padding:10px;
            width:100%;
            border:none;
            border-radius:8px;
            background:#0EA5E9;
            color:white;
            cursor:pointer;
        ">
            Close
        </button>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  document.body.classList.remove("fade-out");
});

// Intercept link clicks
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function (e) {
    const href = this.getAttribute("href");

    // ignore external links / anchors
    if (!href || href.startsWith("#") || href.startsWith("http")) return;

    e.preventDefault();

    document.body.classList.add("fade-out");

    setTimeout(() => {
      window.location.href = href;
    }, 100); // match CSS duration
  });
});
</script>

</body>
</html>
